name: Update system calls data and create PR

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * 2' # Each Tuesday
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  update-and-pr:
    name: Update Tables and Create PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: install packages data
        run: sudo apt-get update

      # without x32 headers we get i386 data for x32
      - name: install x32 headers
        run: sudo apt-get install libc6-dev-x32

      - name: Checkout syscalls-table
        uses: actions/checkout@v7
        with:
          path: syscalls-table/
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout Linux
        uses: actions/checkout@v7
        with:
          path: linux
          repository: torvalds/linux

      - name: Update system calls data
        working-directory: syscalls-table/
        run: |
          bash scripts/update-tables.sh $GITHUB_WORKSPACE/linux/

      - name: Check linux version
        id: get_linux_version
        working-directory: linux/
        run: |
          LINUX_VER=$(make kernelversion)
          echo "LINUX_VERSION=$LINUX_VER" >> $GITHUB_ENV

      - name: Show changes
        working-directory: syscalls-table/
        run: |
          git diff

      - name: Check for changes
        id: check_syscalls_changes
        working-directory: syscalls-table/
        run: |
          # If grep finds any remaining text (indicated by "."), changes exist
          if git status --porcelain=v1 | grep -v "system_calls/linux_version.py" | grep -q .; then
            echo "changes_detected=true" >> $GITHUB_OUTPUT
          else
            echo "changes_detected=false" >> $GITHUB_OUTPUT
          fi

      - name: Create pull request
        # Only execute this step on schedules/manual triggers IF changes were detected
        if: |
          (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') &&
          steps.check_syscalls_changes.outputs.changes_detected == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          path: syscalls-table/
          signoff: true
          base: master
          branch: update/tables
          title: 'update syscalls tables for kernel ${{ env.LINUX_VERSION }}'
          body: |
            This autogenerated PR updates the tables of syscalls from kernel ${{ env.LINUX_VERSION }}. Do not edit this PR.
          commit-message: 'update syscalls tables for kernel ${{ env.LINUX_VERSION }}'
          token: ${{ secrets.GITHUB_TOKEN }}
